name: Supabase Daily Audit

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

jobs:
  audit:
    name: Static Supabase audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Supabase audit
        run: npm run supabase:audit

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: supabase-audit-latest
          path: reports/supabase-audit-latest.json
